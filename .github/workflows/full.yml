name: Projet Frene full workflow

on:
  push:
    paths:
      - data/**
      - alto2tei/**
      - text-extraction.py
      - config.yml
      - htr-united.yml

  pull_request:
    paths:
      - data/**
      - alto2tei/**
      - text-extraction.py
      - config.yml
      - htr-united.yml

  workflow_dispatch:

permissions:
  contents: write

jobs:

  ALTO2TEI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml requests pyyaml

      - name: Create TEI files
        run: |
          python alto2tei/run.py \
            --config config.yml \
            --version "3.0.13" \
            --header \
            --sourcedoc \
            --body

      - name: List generated files after ALTO2TEI
        run: |
          find . -type f | sort

      - name: Commit generated TEI files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git pull

          git add ./data/

          git commit -m "[Automatic] Create TEI files" || echo "Nothing to commit"

          git push || echo "Nothing to push"


  MainZone:
    runs-on: ubuntu-latest

    needs: ALTO2TEI

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml

      - name: Extract and collate text from MainZones
        run: |
          python text-extraction.py ./data/*

      - name: Commit generated TXT files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git pull

          git add ./data/*.txt

          git commit -m "[Automatic] Extract text from MainZones" || echo "Nothing to commit"

          git push || echo "Nothing to push"


  HTRUC:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install htruc

      - name: Run HTRUC
        run: |
          htruc test htr-united.yml


  HTR_United_Metadata_Generator:
    runs-on: ubuntu-latest

    needs:
      - ALTO2TEI
      - MainZone

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            htr-united-metadata-generator \
            htruc \
            anybadge

      - name: Run Report
        run: |
          humGenerator \
            --parse alto \
            --group ./data/**/*.xml \
            --github-envs \
            --to-json updated_metrics.json \
            --chars \
            -n NFD

          cat envs.txt >> $GITHUB_ENV

      - name: Get HTR United Badge Template
        if: github.ref == 'refs/heads/main'

        uses: andymckay/get-gist-action@master

        with:
          gistURL: https://gist.github.com/PonteIneptique/7813bb99f234b334fbf9c6c429ec2406

      - name: Update catalog and badges
        if: github.ref == 'refs/heads/main'

        run: |

          htruc update-volumes \
            htr-united.yml \
            updated_metrics.json \
            --inplace

          mkdir -p badges

          anybadge \
            --value=${{ env.HTRUNITED_CHARS }} \
            --file=badges/characters.svg \
            --label=Characters \
            --color=#007ec6 \
            --overwrite \
            --template=${{ steps.get.outputs.file }}

          anybadge \
            --value=${{ env.HTRUNITED_REGNS }} \
            --file=badges/regions.svg \
            --label=Regions \
            --color=#007ec6 \
            --overwrite \
            --template=${{ steps.get.outputs.file }}

          anybadge \
            --value=${{ env.HTRUNITED_LINES }} \
            --file=badges/lines.svg \
            --label=Lines \
            --color=#007ec6 \
            --overwrite \
            --template=${{ steps.get.outputs.file }}

          anybadge \
            --value=${{ env.HTRUNITED_FILES }} \
            --file=badges/files.svg \
            --label="XML Files" \
            --color=#007ec6 \
            --overwrite \
            --template=${{ steps.get.outputs.file }}

          git config user.name github-actions
          git config user.email github-actions@github.com

          git pull

          git add htr-united.yml
          git add badges/

          git commit -m "[Automatic] Update catalog and badges" || echo "Nothing to commit"

          git push || echo "Nothing to push"


  HTRVX:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install htrvx

      - name: Run HTRVX
        run: |
          htrvx \
            --verbose \
            --group \
            --format alto \
            --check-empty \
            --segmonto \
            --xsd \
            ./data/**/*.xml